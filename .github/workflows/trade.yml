name: Claude Trader

on:
  schedule:
    # 9:30 AM ET = 13:30 UTC (Mon-Fri)
    - cron: '30 13 * * 1-5'
    # 10:30 AM ET
    - cron: '30 14 * * 1-5'
    # 11:30 AM ET
    - cron: '30 15 * * 1-5'
    # 12:30 PM ET
    - cron: '30 16 * * 1-5'
    # 1:30 PM ET
    - cron: '30 17 * * 1-5'
    # 2:30 PM ET
    - cron: '30 18 * * 1-5'
    # 3:30 PM ET (last cycle, also generates daily report)
    - cron: '30 19 * * 1-5'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit data files back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run trading cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/trade.mjs

      - name: Commit updated portfolio
        run: |
           git config user.name "Claude Trader Bot"
            git config user.email "bot@claude-trader"
            git pull --rebase origin master
            git add data/portfolio.json data/reports.json
            git diff --staged --quiet || git commit -m "📈 Trading cycle $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
